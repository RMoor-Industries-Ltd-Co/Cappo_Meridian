name: CI & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/piaar/cappo-meridian

jobs:
  # ── Health checks: typecheck, lint, production build ──────────────────
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build

  # ── Build the Docker image in CI and push to GHCR ─────────────────────
  build-image:
    needs: checks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy: server pulls the prebuilt image and restarts ──────────────
  deploy:
    needs: build-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check deploy secrets
        id: gate
        run: |
          if [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] && [ -n "${{ secrets.SSH_USER }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy skipped — set SSH_USER and SSH_PRIVATE_KEY secrets to enable."
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.ready == 'true'

      - name: Configure SSH
        if: steps.gate.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync compose files
        if: steps.gate.outputs.ready == 'true'
        run: |
          scp -i ~/.ssh/id_deploy docker-compose.yml Caddyfile \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/cappo/"

      - name: Pull image & restart
        if: steps.gate.outputs.ready == 'true'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/id_deploy "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash << ENDSSH
            set -euo pipefail
            cd /opt/cappo
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_ACTOR}" --password-stdin
            docker compose pull
            docker logout ghcr.io
            ~/start-cappo.sh
            docker image prune -f
          ENDSSH

      - name: Health check
        if: steps.gate.outputs.ready == 'true'
        run: |
          for i in $(seq 1 12); do
            if curl -fsS https://cappo.apex-meridian-group.com/api/health; then
              echo "✅ healthy"; exit 0
            fi
            echo "waiting for app/TLS... attempt $i"; sleep 10
          done
          echo "❌ health check failed"; exit 1
