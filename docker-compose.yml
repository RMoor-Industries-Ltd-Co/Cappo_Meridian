# Production stack for the Linode host.
# `web` is the Next.js app (built from this repo); `caddy` terminates TLS for
# cappo.apex-meridian-group.com and reverse-proxies to it.
services:
  web:
    # Prebuilt image from CI (GitHub Container Registry) — the server pulls,
    # never builds. For a local build use: docker build -t $IMAGE .
    image: ghcr.io/piaar/cappo-meridian:latest
    env_file: .env
    environment:
      - TOKEN_STORE_PATH=/data/google-tokens.json
    volumes:
      - cappo_data:/data
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    env_file: .env # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
    volumes:
      - cappo_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-cappo} -d $${POSTGRES_DB:-cappo}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  cappo_data:
  cappo_db:
  caddy_data:
  caddy_config:
