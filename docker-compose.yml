# Production stack for the Linode host.
# `web` is the Next.js app (built from this repo); `caddy` terminates TLS for
# cappo.apex-meridian-group.com and reverse-proxies to it.
services:
  web:
    # Prebuilt image from CI (GitHub Container Registry) — the server pulls,
    # never builds. For a local build use: docker build -t $IMAGE .
    image: ghcr.io/rmoor-industries-ltd-co/cappo-meridian:latest
    environment:
      - TOKEN_STORE_PATH=/data/google-tokens.json
      - APP_BASE_URL
      - GOOGLE_WORKSPACE_DOMAIN
      - PARTNER_EMAILS
      - CLICKUP_API_TOKEN
      - CLICKUP_TEAM_ID
      - CLICKUP_SPACE_ID
      - NOTION_API_KEY
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - GOOGLE_REDIRECT_URI
      - AUTH_SECRET
      - AUTH_URL
      - AUTH_TRUST_HOST
      - ANTHROPIC_API_KEY
      - CLAUDE_API_KEY
      - CLAUDE_MODEL
      - OPENAI_API_KEY
      - OPENAI_MODEL
      - PERPLEXITY_API_KEY
      - PERPLEXITY_MODEL
      - DATABASE_URL
      - AGENT_API_KEY
      - SECRET_ENCRYPTION_KEY
    volumes:
      - cappo_data:/data
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - cappo_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-cappo} -d $${POSTGRES_DB:-cappo}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  cappo_data:
  cappo_db:
  caddy_data:
  caddy_config:
